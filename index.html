<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Word</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-shell">
        <section class="game-panel" aria-labelledby="gameTitle">
            <div class="title-row">
                <p class="eyebrow">Word Challenge</p>
                <h1 id="gameTitle">Guess the Word</h1>
            </div>

            <div class="score-board" aria-label="Game stats">
                <div>
                    <span class="stat-label">Attempts</span>
                    <strong id="attemptsLeft">0</strong>
                </div>
                <div>
                    <span class="stat-label">Score</span>
                    <strong id="score">0</strong>
                </div>
                <div>
                    <span class="stat-label">Streak</span>
                    <strong id="streak">0</strong>
                </div>
            </div>

            <div class="hint-box">
                <span class="hint-label">Hint</span>
                <p id="hint">Loading...</p>
            </div>

            <p id="wordDisplay" class="word-display" aria-label="Hidden word"></p>

            <form id="guessForm" class="guess-form" autocomplete="off">
                <label for="guessInput">Pick one letter</label>
                <div class="input-row">
                    <input
                        type="text"
                        id="guessInput"
                        name="guess"
                        maxlength="1"
                        inputmode="text"
                        aria-describedby="message"
                    >
                    <button type="submit" id="guessButton">Guess</button>
                </div>
            </form>

            <p id="message" class="message" role="status" aria-live="polite"></p>

            <div class="letters-area">
                <span class="letters-label">Used letters</span>
                <p id="usedLetters" class="used-letters">None yet</p>
            </div>

            <div class="actions">
                <button type="button" id="newWordButton" class="secondary-button">New Word</button>
                <button type="button" id="resetScoreButton" class="ghost-button">Reset Score</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
